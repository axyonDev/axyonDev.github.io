<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sevcan, Ahmet ve Murathan'ın kişisel ana sayfası. Sihirli spark ve gece modu.">
<meta name="author" content="Ahmet">

<link rel="icon" type="image/png" href="https://github.githubassets.com/favicons/favicon.png"> 

<title>Aile & Oyun Sayfası - Uzay Teması ve Spark</title>
<style>
  /* Genel sıfırlama */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Koyu Uzay Teması */
    background: radial-gradient(ellipse at top, #1b2735 0%, #090a0f 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start; /* Üstten başla */
    padding: 30px 20px; 
    overflow: hidden; /* Yıldızların taşmaması için */
    color: #ffffff; /* Varsayılan metin rengi beyaz */
  }

  /* --- Kayan Yıldızlar CSS (Öncekiyle aynı) --- */
  .stars-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; 
    overflow: hidden;
  }

  .shooting-star {
    position: absolute;
    height: 2px;
    background: linear-gradient(-45deg, rgba(95, 145, 255, 1), rgba(0, 0, 255, 0));
    filter: drop-shadow(0 0 6px rgba(105, 155, 255, 1));
    animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
    opacity: 0;
  }

  /* Yıldızların rastgele konumları ve gecikmeleri (Kısaltılmış) */
  .shooting-star:nth-child(1) { top: 10%; left: 80%; animation-delay: 0s; }
  .shooting-star:nth-child(2) { top: 25%; left: 95%; animation-delay: 1.5s; animation-duration: 2.5s; }
  .shooting-star:nth-child(3) { top: 40%; left: 70%; animation-delay: 2s; animation-duration: 3.5s; }
  /* ... Diğer 6 yıldız için benzer tanımlamalar ... */

  /* Yıldız kuyruk ve kayma animasyonları */
  @keyframes tail {
    0% { width: 0; }
    30% { width: 100px; }
    100% { width: 0; }
  }

  @keyframes shooting {
    0% {
      opacity: 0;
      transform: translateX(0) translateY(0) rotate(-45deg);
    }
    10% {
      opacity: 1;
    }
    30% {
      opacity: 1;
      transform: translateX(-200px) translateY(200px) rotate(-45deg);
    }
    100% {
      opacity: 0;
      transform: translateX(-400px) translateY(400px) rotate(-45deg);
    }
  }

  /* --- YENİ EKLENEN: İsim Alanı ve Sihirli Spark Konteyneri --- */
  .hero-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    /* GÜNCELLEME: İsimleri yukarıda tut */
    margin-top: 50px; 
    margin-bottom: 70px; /* Butonlarla boşluk */
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  /* --- YENİ EKLENEN: Sihirli Spark --- */
  .magic-spark {
    position: absolute;
    width: 10px;
    height: 10px;
    background: radial-gradient(#fff, rgba(100, 150, 255, 0)); /* Beyaz parlayan merkez */
    border-radius: 50%;
    filter: drop-shadow(0 0 8px rgba(100, 150, 255, 1)); /* Parlaklık */
    opacity: 0.9;
    z-index: 15; /* İsimlerin önünde */
    pointer-events: none; /* Metinlerin tıklanmasını engelleme */
    animation: snake-weave 12s linear infinite; /* Yılan gibi kıvrılma */
  }

  /* --- YENİ EKLENEN: Kıvrılma Animasyonu Path'i --- */
  @keyframes snake-weave {
    0% { left: 10%; top: 10%; opacity: 0; }
    2% { opacity: 0.9; }
    10% { left: 15%; top: 5%; } /* Sevcan'ın üstünden geç */
    20% { left: 25%; top: 20%; } /* Aradan aşağı in */
    30% { left: 35%; top: 5%; } /* Ahmet'in üstünden geç */
    40% { left: 45%; top: 20%; } /* Aradan aşağı in */
    50% { left: 55%; top: 5%; } /* Murathan'ın üstünden geç */
    60% { left: 65%; top: 15%; } /* Aradan aşağı in */
    70% { left: 75%; top: 5%; } /* Geri dön */
    80% { left: 85%; top: 10%; } /* Yüksel */
    90% { left: 95%; top: 5%; opacity: 0.9; }
    100% { left: 10%; top: 10%; opacity: 0; } /* Döngüyü tamamla */
  }

  /* Animasyonlu İsim Alanı */
  .name-badge {
    position: relative;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    
    padding: 14px 30px; 
    border-radius: 50px;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 8px 32px 0 rgba(100, 150, 255, 0.15);
    
    animation: float 4s ease-in-out infinite;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    cursor: default;
  }

  /* İsim renkleri */
  .name-badge:nth-child(2) { animation-delay: 0s; color: #ff5e91; } /* Sevcan - Parlak Pembe */
  .name-badge:nth-child(3) { animation-delay: 0.2s; color: #5dade2; } /* Ahmet - Parlak Mavi */
  .name-badge:nth-child(4) { animation-delay: 0.4s; color: #f4d03f; } /* Murathan - Parlak Altın */

  .name-badge:hover {
    transform: scale(1.05) translateY(-5px);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 10px 35px 0 rgba(100, 150, 255, 0.3);
    animation-play-state: paused;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  /* Butonlar Alanı (Alt Alta) */
  .button-wrapper {
    display: flex;
    flex-direction: column; 
    align-items: center; 
    gap: 18px; 
    width: 100%;
    max-width: 800px;
    z-index: 10;
  }

  .custom-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #ffffff !important;
    text-decoration: none;
    border-radius: 10px;
    transition: all 0.3s ease;
    text-align: center;
    width: 100%; 
    max-width: 250px; 
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
  }

  /* Parlayan kristal butonu */
  .crystal-btn {
    background: linear-gradient(135deg, #3a6b8a 0%, #6d5da1 100%);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .crystal-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(100, 150, 255, 0.5);
    background: linear-gradient(135deg, #4b89af 0%, #7d6ab6 100%);
  }

  /* Parlayan mücevher butonu */
  .jewelry-btn {
    background: linear-gradient(135deg, #d4a017 0%, #a37609 100%);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .jewelry-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
    background: linear-gradient(135deg, #e7b328 0%, #b4850d 100%);
  }

  /* Mobil Cihazlar İçin Özel Kural */
  @media (max-width: 480px) {
    .name-badge {
      font-size: 16px;
      padding: 10px 24px;
    }
    .magic-spark { width: 8px; height: 8px; filter: drop-shadow(0 0 6px rgba(100, 150, 255, 1)); } /* Ufal */
    .hero-container { margin-bottom: 50px; gap: 10px; } /* Mobilde sıkış */
    .custom-btn {
      width: 100%;
      max-width: 280px;
    }
  }
</style>
</head>
<body>

  <div class="stars-container">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>

  <div class="hero-container">
    <div class="magic-spark"></div>

    <div class="name-badge">♥ Sevcan ♥</div>
    <div class="name-badge">♥ Ahmet ♥</div>
    <div class="name-badge">♥ Murathan ♥</div>
  </div>

  <div class="button-wrapper">
    <a href="https://nuclewar1.github.io/web/AXYCRYSTAL.html" target="_blank" rel="noopener noreferrer" class="custom-btn crystal-btn">
      AXY CRYSTAL OYUN
    </a>
    <a href="https://nuclewar1.github.io/web/2048.html" target="_blank" rel="noopener noreferrer" class="custom-btn jewelry-btn">
      2048 JEWELRY OYUN
    </a>
  </div>

</body>
</html>
